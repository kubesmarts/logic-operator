name: E2E Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: venv
          key: ${{ runner.os }}-venv-${{ hashFiles('images/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Install CEKit
        run: |
          ./hack/setup-cekit.sh
          source venv/bin/activate
          cekit --version

      - name: Copy .env configuration
        run: cp .env.example .env

      - name: Pull test images
        run: ./hack/pull-test-images.sh

      - name: Build operator image
        run: |
          source venv/bin/activate
          make container-build

      - name: Create KIND cluster with registry
        run: make create-cluster

      - name: Load images into KIND
        run: make load-docker-image

      - name: Deploy operator
        run: make deploy

      - name: Deploy Knative
        run: make deploy-knative

      - name: Deploy Prometheus
        run: make deploy-prometheus

      - name: Wait for operator to be ready
        run: |
          sleep 30
          kubectl wait pod -A -l app.kubernetes.io/name=sonataflow-operator --for condition=Ready --timeout 120s

      - name: Run platform tests
        run: make test-e2e label=platform

      - name: Run cluster tests
        run: make test-e2e label=cluster

      - name: Run flows-monitoring tests
        run: make test-e2e label=flows-monitoring

      - name: Run flows-persistence tests
        run: make test-e2e label=flows-persistence

      - name: Run flows-ephemeral tests
        run: make test-e2e label=flows-ephemeral

      - name: Collect cluster logs on failure
        if: failure()
        run: |
          echo "=== Operator logs ==="
          kubectl logs -n sonataflow-operator-system deployment/sonataflow-operator-controller-manager -c manager --tail=100 || true
          echo "=== All pods ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-test-report-*.xml
            test/logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: make delete-cluster || true
