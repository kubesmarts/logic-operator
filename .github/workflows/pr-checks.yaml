name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Save Go bin directory to environment
        run: |
          GO_BIN_DIR=$(dirname $(which go))
          echo "GO_BIN_DIR=$GO_BIN_DIR" >> $GITHUB_ENV

      - name: Copy .env configuration
        run: cp .env.example .env

      - name: Install operator-sdk
        run: |
          export OPERATOR_SDK_VERSION=v1.35.0
          curl -sSLo /tmp/operator-sdk "https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_linux_amd64"
          chmod +x /tmp/operator-sdk
          sudo mv /tmp/operator-sdk /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Generate bundle (required for unit tests)
        run: make bundle

      - name: Format generated code
        run: gofmt -s -w .

      - name: Run go fmt check
        run: |
          # Exclude target/ directory (build artifacts)
          UNFORMATTED=$(gofmt -s -l . | grep -v '^target/' || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Run go vet
        run: make vet

      - name: Run unit tests
        env:
          GO_BIN_PATH: ${{ env.GO_BIN_DIR }}
        run: |
          export PATH="$GO_BIN_PATH:$PATH"
          make test

      - name: Build operator binary
        run: make build

      - name: Check Go modules
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  verify-manifests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Save Go bin directory to environment
        run: |
          GO_BIN_DIR=$(dirname $(which go))
          echo "GO_BIN_DIR=$GO_BIN_DIR" >> $GITHUB_ENV

      - name: Copy .env configuration
        run: cp .env.example .env

      - name: Verify generated manifests are up to date
        env:
          GO_BIN_PATH: ${{ env.GO_BIN_DIR }}
        run: |
          export PATH="$GO_BIN_PATH:$PATH"
          make manifests
          make addheaders
          git diff --exit-code config/rbac/ config/crd/
