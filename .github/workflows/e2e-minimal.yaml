name: E2E Tests (Quick - PR Only)

on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'adr/**'
      - 'cli/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  e2e-minimal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install CEKit
        uses: cekit/actions-setup-cekit@v1.1.7

      - name: Verify CEKit installation
        run: cekit --version

      - name: Install operator-sdk
        run: |
          export OPERATOR_SDK_VERSION=v1.35.0
          curl -sSLo /tmp/operator-sdk "https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_linux_amd64"
          chmod +x /tmp/operator-sdk
          sudo mv /tmp/operator-sdk /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Save Go bin directory to environment
        run: |
          GO_BIN_DIR=$(dirname $(which go))
          echo "GO_BIN_DIR=$GO_BIN_DIR" >> $GITHUB_ENV

      - name: Copy .env configuration
        run: cp .env.example .env

      - name: Build operator
        env:
          GO_BIN_PATH: ${{ env.GO_BIN_DIR }}
        run: |
          export PATH="$GO_BIN_PATH:$PATH"
          make container-build IMG=quay.io/kubesmarts/logic-operator:2.0.0

      - name: Create KinD cluster
        run: make create-cluster

      - name: Load operator image to KinD
        run: make load-docker-image IMG=quay.io/kubesmarts/logic-operator:2.0.0

      - name: Install operator
        run: make deploy IMG=quay.io/kubesmarts/logic-operator:2.0.0

      - name: Deploy Knative
        run: make deploy-knative

      - name: Wait for operator to be ready
        run: kubectl wait pod -A -l app.kubernetes.io/name=sonataflow-operator --for condition=Ready --timeout 120s

      - name: Verify operator health
        run: |
          echo "=== Operator deployment ==="
          kubectl get deployment -n sonataflow-operator-system
          echo ""
          echo "=== Operator pods ==="
          kubectl get pods -n sonataflow-operator-system -o wide
          echo ""
          echo "=== Operator logs (startup) ==="
          kubectl logs -n sonataflow-operator-system deployment/sonataflow-operator-controller-manager -c manager --tail=50

      - name: Run critical platform tests only
        env:
          PREBUILT_WORKFLOWS: "callbackstatetimeouts,callbackstatetimeouts-persistence"
        run: |
          # Run only gitops with postgresql (the test we just fixed) and one basic platform test
          # PREBUILT_WORKFLOWS env var limits to only the 2 workflows we actually use
          go test ./test/e2e/e2e_suite_test.go ./test/e2e/helpers.go ./test/e2e/platform_test.go \
            -v -ginkgo.v -ginkgo.no-color -ginkgo.github-output \
            -ginkgo.focus="postgreSQL.*gitops|ephemeral.*gitops" \
            -ginkgo.junit-report=./e2e-test-report-platform-minimal.xml -timeout 20m

      - name: Run basic workflow tests (one ephemeral test only)
        env:
          PREBUILT_WORKFLOWS: "callbackstatetimeouts,callbackstatetimeouts-persistence"
        run: |
          # Run only one basic ephemeral workflow test
          # PREBUILT_WORKFLOWS must match the platform test step to avoid rebuilding
          go test ./test/e2e/e2e_suite_test.go ./test/e2e/helpers.go ./test/e2e/workflow_test.go \
            -v -ginkgo.v -ginkgo.no-color -ginkgo.github-output \
            -ginkgo.label-filter=flows-ephemeral \
            -ginkgo.focus="preview profile" \
            -ginkgo.junit-report=./e2e-test-report-workflow-minimal.xml -timeout 10m

      - name: Collect cluster logs on failure
        if: failure()
        run: |
          echo "=== Operator deployment status ==="
          kubectl get deployment -n sonataflow-operator-system -o wide || true
          echo ""
          echo "=== Operator pods ==="
          kubectl get pods -n sonataflow-operator-system -o wide || true
          echo ""
          echo "=== Operator logs (last 200 lines) ==="
          kubectl logs -n sonataflow-operator-system deployment/sonataflow-operator-controller-manager -c manager --tail=200 || true
          echo ""
          echo "=== SonataFlow CRs ==="
          kubectl get sonataflow -A -o wide || true
          echo ""
          echo "=== SonataFlow CR details (YAML) ==="
          kubectl get sonataflow -A -o yaml || true
          echo ""
          echo "=== SonataFlowPlatform CRs ==="
          kubectl get sonataflowplatform -A -o wide || true
          echo ""
          echo "=== SonataFlowPlatform details (YAML) ==="
          kubectl get sonataflowplatform -A -o yaml || true
          echo ""
          echo "=== Workflow application pods ==="
          kubectl get pods -A -l sonataflow.org/workflow-app --show-labels || true
          echo ""
          echo "=== Platform service pods ==="
          kubectl get pods -A -l app.kubernetes.io/name -o wide || true
          echo ""
          echo "=== Workflow pod logs (current) ==="
          for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
            for pod in $(kubectl get pods -n $ns -l sonataflow.org/workflow-app --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true); do
              echo "--- Logs for $ns/$pod (current) ---"
              kubectl logs -n $ns $pod --tail=100 || true
              echo ""
            done
          done
          echo ""
          echo "=== Workflow pod logs (previous) ==="
          for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
            for pod in $(kubectl get pods -n $ns -l sonataflow.org/workflow-app --no-headers -o custom-columns=":metadata.name" 2>/dev/null || true); do
              echo "--- Logs for $ns/$pod (previous container) ---"
              kubectl logs -n $ns $pod --previous --tail=100 2>/dev/null || echo "No previous container logs"
              echo ""
            done
          done
          echo ""
          echo "=== All pods ==="
          kubectl get pods -A -o wide || true
          echo ""
          echo "=== Recent events (last 100) ==="
          kubectl get events -A --sort-by='.metadata.creationTimestamp' | tail -100 || true
