name: CLI E2E Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'cli/**'
      - '.github/workflows/cli-e2e.yaml'
  pull_request:
    branches: [main, master]
    paths:
      - 'cli/**'
      - '.github/workflows/cli-e2e.yaml'
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Copy .env configuration
        run: cp .env.example .env

      - name: Install KIND
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create KIND cluster
        run: kind create cluster --wait 5m

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Install Operator Lifecycle Manager (OLM)
        run: |
          curl -sL https://github.com/operator-framework/operator-lifecycle-manager/releases/download/v0.31.0/install.sh | bash -s v0.31.0

      - name: Wait for OLM to be ready
        run: |
          kubectl wait --for=condition=ready pod -l app=olm-operator -n olm --timeout=300s
          kubectl wait --for=condition=ready pod -l app=catalog-operator -n olm --timeout=300s

      - name: Preload kube-rbac-proxy image
        run: |
          docker pull quay.io/brancz/kube-rbac-proxy:v0.13.1
          docker tag quay.io/brancz/kube-rbac-proxy:v0.13.1 gcr.io/kubebuilder/kube-rbac-proxy:v0.13.0
          kind load docker-image gcr.io/kubebuilder/kube-rbac-proxy:v0.13.0

      - name: Build CLI
        working-directory: cli
        run: make build

      - name: Run e2e tests
        working-directory: cli
        run: |
          go test -v ./e2e-tests/... -tags e2e_tests -run TestQuarkusRunCommand -timeout 20m 2>&1 | tee ./dist-tests-e2e/go-test-output-e2e.txt || true
        continue-on-error: true

      - name: Generate JUnit report
        if: always()
        working-directory: cli
        run: |
          if [ -f ./dist-tests-e2e/go-test-output-e2e.txt ]; then
            go run github.com/jstemmer/go-junit-report/v2 \
              -in ./dist-tests-e2e/go-test-output-e2e.txt \
              -out ./dist-tests-e2e/junit-report-it.xml || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-e2e-test-results
          path: cli/dist-tests-e2e/
          retention-days: 7

      - name: Display test summary
        if: always()
        working-directory: cli
        run: |
          if [ -f ./dist-tests-e2e/go-test-output-e2e.txt ]; then
            echo "=== Test Output Summary ==="
            tail -50 ./dist-tests-e2e/go-test-output-e2e.txt
          fi

      - name: Cleanup KIND cluster
        if: always()
        run: kind delete cluster
